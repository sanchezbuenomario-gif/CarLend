<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Métodos de Pago | CarLend</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 40px; }
        .card-box { background: white; max-width: 500px; margin: 0 auto; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .visa-card { background: linear-gradient(135deg, #1a1a1a, #444); color: white; padding: 25px; border-radius: 12px; margin-bottom: 30px; position: relative; }
        .input-field { width: 100%; padding: 12px; margin: 10px 0 20px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-orange { background: #ff6600; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <a href="{{ url_for('cliente') }}" style="text-decoration: none; color: var(--brand-orange); font-weight: 600; font-size: 0.9rem; padding: 40px 10px;">← Volver al dashboard</a>
    <div class="card-box">
        <h2 style="font-family:Lexend; margin-bottom:20px;">Tarjetas Guardadas</h2>
        
        <div class="visa-card">
            <div style="text-align:right; font-weight:bold; font-style:italic;">VISA</div>
            <div style="margin: 20px 0; font-size:1.2rem; letter-spacing:3px;">**** **** **** 4290</div>
            <div style="display:flex; justify-content:space-between; font-size:0.8rem;">
                <span>JUAN PEREZ</span>
                <span>12/28</span>
            </div>
        </div>

        <h3>Añadir Nueva Tarjeta</h3>
        <label>Número de Tarjeta</label>
        <input type="text" class="input-field" placeholder="0000 0000 0000 0000">
        
        <div style="display:flex; gap:10px;">
            <div style="flex:1">
                <label>Expira</label>
                <input type="text" class="input-field" placeholder="MM/AA">
            </div>
            <div style="flex:1">
                <label>CVV</label>
                <input type="text" class="input-field" placeholder="123">
            </div>
        </div>

        <button class="btn-orange">Guardar Tarjeta</button>
        <p style="text-align:center; margin-top:20px;"><a href="{{ url_for('index') }}" style="color:#666;">Volver al Inicio</a></p>
    </div>
</body>
</html>
