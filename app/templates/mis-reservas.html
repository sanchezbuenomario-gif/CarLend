<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Reservas | CarLend</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mis-reservas.css') }}">
</head>
<body>
    <nav>
        <a href="{{ url_for('index') }}"><img src="{{ url_for('static', filename='img/carlendlogo.png') }}" alt="CarLend Logo"></a>
        <a href="{{ url_for('cliente') }}" style="text-decoration: none; color: var(--brand-orange); font-weight: 600; font-size: 0.9rem; padding: 40px 10px;">← Volver al Panel</a>
    </nav>

    <div class="container">
        <h1 style="font-family:Lexend;">Mis Reservas</h1>
        
        <h3 style="color:#888; margin-top:30px;">ACTUAL</h3>
        <div class="booking-card">
            <div class="car-thumb" style="background-image: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&q=80&w=300');"></div>
            <div style="flex:1">
                <div style="display:flex; justify-content:space-between;">
                    <h3>Performance GT S-Line</h3>
                    <span class="badge">EN CURSO</span>
                </div>
                <p>Recogida: Madrid T4 - 02 Mar, 10:00h</p>
                <p>Devolución: Madrid T4 - 05 Mar, 10:00h</p>
                <div style="margin-top:15px;">
                    <button class="btn-outline">Ver Contrato</button>
                    <button class="btn-outline">Ampliar Alquiler</button>
                </div>
            </div>
        </div>

        <h3 style="color:#888; margin-top:50px;">PASADAS</h3>
        <div class="booking-card" style="border-left-color: #ccc; opacity: 0.8;">
            <div class="car-thumb" style="background-image: url('https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?auto=format&fit=crop&q=80&w=300');"></div>
            <div style="flex:1">
                <h3>City Urban Compact</h3>
                <p>Finalizado el 15 Feb - Guadalajara Centro</p>
                <button class="btn-outline">Descargar Factura</button>
            </div>
        </div>
    </div>
</body>
</html>
