<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro | CarLend</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&family=Open+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/registro.css') }}">
</head>
    <body>
    <nav>
        <a href="{{ url_for('index') }}">
            <img src="{{ url_for('static', filename='img/carlendlogo.png') }}" alt="CarLend">
        </a>

        <div class="nav-links">
            <a href="{{ url_for('index') }}">Inicio</a>
            <a href="{{ url_for('flota') }}">Vehículos</a>
            <a href="{{ url_for('registro') }}" class="btn-cliente">Registrarse</a>
        </div>
    </nav>


    <section class="registro-section">

    <div class="registro-card tarjeta-coche">

    <h1>Crear cuenta</h1>
    <p class="subtitulo">Únete a CarLend y empieza a conducir</p>

    <form method="POST">

    <div class="campo">
    <label>Nombre completo</label>
    <input type="text" name="nombre" required>
    </div>

    <div class="campo">
    <label>Correo electrónico</label>
    <input type="email" name="email" required>
    </div>

    <div class="campo">
    <label>Contraseña</label>
    <input type="password" name="password" required>
    </div>

    <div class="campo">
    <label>Teléfono</label>
    <input type="tel" name="telefono">
    </div>

    <button type="submit" class="btn-registro">Crear cuenta</button>

    <p class="login-link">
    ¿Ya tienes cuenta? <a href="#">Inicia sesión</a>
    </p>

    </form>

    </div>

    </section>


    <footer>

    <div class="grid-footer">

    <div class="col-footer">
    <h4>CarLend</h4>
    <ul>
    <li><a href="{{ url_for('index') }}">Inicio</a></li>
    <li><a href="{{ url_for('flota') }}">Vehículos</a></li>
    <li><a href="#">Soporte</a></li>
    </ul>
    </div>

    </div>

        <div class="footer-abajo">
        © 2026 CarLend. Todos los derechos reservados.
        </div>

    </footer>

    </body>
</html>
